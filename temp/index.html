<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UN SDG 12 - Responsible Consumption & Production</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f4f6f8;
}

header {
    background: #2E7D32;
    color: white;
    padding: 20px;
    text-align: center;
}

.container {
    padding: 20px;
    max-width: 1200px;
    margin: auto;
}

.card {
    background: white;
    padding: 15px;
    margin: 15px 0;
    border-radius: 8px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.target-title {
    font-weight: bold;
    margin-bottom: 10px;
}

.example {
    border-left: 4px solid #2E7D32;
    padding-left: 10px;
    margin: 10px 0;
}

button {
    padding: 6px 12px;
    margin: 5px 5px 5px 0;
    border: none;
    border-radius: 4px;
    cursor: pointer;
}

.add-btn { background: #2E7D32; color: white; }
.edit-btn { background: #f9a825; color: white; }
.delete-btn { background: #c62828; color: white; }

input {
    padding: 6px;
    margin: 5px 0;
    width: 100%;
}
</style>
</head>

<body>

<header>
    <h1>UN Sustainable Development Goal 12</h1>
    <h2>Responsible Consumption & Production</h2>
</header>

<div class="container" id="content"></div>

<script>

let goalData = {};

// FETCH JSON DATA
fetch("goal12.json")
.then(response => response.json())
.then(data => {
    goalData = data.goal;
    renderPage();
})
.catch(error => console.error("Error loading JSON:", error));


// RENDER PAGE
function renderPage() {
    const container = document.getElementById("content");
    container.innerHTML = "";

    const descriptionCard = `
        <div class="card">
            <h2>${goalData.title}</h2>
            <p>${goalData.description}</p>
            <p>
                <a href="${goalData.links.official}" target="_blank">Official UN Page</a> |
                <a href="${goalData.links.undp}" target="_blank">UNDP Page</a>
            </p>
        </div>
    `;
    container.innerHTML += descriptionCard;

    goalData.targets.forEach(target => {
        let targetHTML = `
            <div class="card">
                <div class="target-title">Target ${target.number}</div>
                <p>${target.description}</p>
        `;

        target.examples.forEach((example, index) => {
            targetHTML += `
                <div class="example">
                    <strong>${example.title}</strong>
                    <p>${example.description}</p>
                    ${example.images.map(img => `<img src="${img}" width="150">`).join("")}
                    <br>
                    <button class="edit-btn" onclick="editExample(${target.id}, ${index})">Edit</button>
                    <button class="delete-btn" onclick="deleteExample(${target.id}, ${index})">Delete</button>
                </div>
            `;
        });

        targetHTML += `
            <button class="add-btn" onclick="addExample(${target.id})">Add Example</button>
            </div>
        `;

        container.innerHTML += targetHTML;
    });
}


// ADD EXAMPLE
function addExample(targetId) {
    const title = prompt("Enter example title:");
    const description = prompt("Enter description:");

    if (!title || !description) return;

    const target = goalData.targets.find(t => t.id === targetId);

    target.examples.push({
        title: title,
        description: description,
        images: [],
        tags: []
    });

    renderPage();
}


// DELETE EXAMPLE
function deleteExample(targetId, index) {
    const target = goalData.targets.find(t => t.id === targetId);
    target.examples.splice(index, 1);
    renderPage();
}


// EDIT EXAMPLE
function editExample(targetId, index) {
    const target = goalData.targets.find(t => t.id === targetId);
    const example = target.examples[index];

    const newTitle = prompt("Edit title:", example.title);
    const newDescription = prompt("Edit description:", example.description);

    if (!newTitle || !newDescription) return;

    example.title = newTitle;
    example.description = newDescription;

    renderPage();
}

</script>

</body>
</html>
